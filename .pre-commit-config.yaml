repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
      - id: cargo-check-mav
        name: cargo check mav
        entry: cargo check -p mav --bin mav --locked
        language: system
        pass_filenames: false
      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
      - id: typos
        name: typos
        entry: typos
        language: system
        pass_filenames: false
      - id: file-line-budget
        name: file line budget
        entry: script/check-file-lines 500
        language: system
        pass_filenames: false
