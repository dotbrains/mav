name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      markdown_only: ${{ steps.filter.outputs.markdown_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        name: detect markdown-only changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          if [[ -n "$changed_files" ]] && ! grep -vE '\.md$' <<< "$changed_files" >/dev/null; then
            echo "markdown_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "markdown_only=false" >> "$GITHUB_OUTPUT"
          fi

  hygiene:
    name: hygiene
    needs: changes
    if: needs.changes.outputs.markdown_only != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: flox/install-flox-action@v2
      - name: format
        run: flox activate -- cargo fmt --all -- --check
      - name: manifest check
        run: flox activate -- cargo check -p mav --bin mav --locked

  nix:
    name: nix
    needs: changes
    if: needs.changes.outputs.markdown_only != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: flake check
        run: nix flake check --accept-flake-config

  docs:
    name: docs
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: flox/install-flox-action@v2
      - name: markdown links
        run: flox activate -- lychee --offline README.md docs/**/*.md
